<!DOCTYPE html>
<html>
<head>
    <style>
        .post-item { border-bottom: 1px solid #ccc; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .list-container { width: 100%; max-width: 500px; margin: auto; }
    </style>
</head>
<body>
    <div class="list-container">
        <h2>対戦待ち掲示板</h2>
        <div id="board">読み込み中...</div>
    </div>

    <script>
        async function loadBoard() {
            const res = await fetch('data/posts.json');
            const data = await res.json();
            
            // 新着順（timestamp）に並び替え
            data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            const container = document.getElementById('board');
            container.innerHTML = data.map(item => `
                <div class="post-item">
                    <div>LV.${item.robot.level} | ${item.robot.name}</div>
                    <button onclick="showDetail('${item.postId}')">詳細</button>
                </div>
            `).join('');
        }
        
        function showDetail(id) { alert("詳細を表示します: " + id); }
        
        loadBoard();
    </script>
</body>
</html>
